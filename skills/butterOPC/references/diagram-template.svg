<svg width="100%" viewBox="0 0 680 744" role="img">
<title>butterOPC framework with OKR as the explicit linkage between Strategy and operating model cell priorities</title>
<desc>Direction tier with Mission and Vision at top, then Strategy and OKRs side by side connected by drives and learning arrows. A downward arrow from OKRs labeled "tags cells" extends into the Operating Model, making explicit that OKRs are the linkage between Strategy above and priorities inside cells below. Operating Model shows three vertical customer-value pillars (Create value, Capture value, Scale value) each with three placeholder priority slots, and a horizontal stakeholder support layer (Talent, Capital, License). Operating Rhythm flows from Annual to Daily. Foundation is where all upstream outputs settle (沉淀) into knowledge.</desc>
